services:
  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - STOREFRONT_BACKEND_URL=http://core-commerce-api:3001
      - ADMIN_BACKEND_URL=http://admin-management-api:4001
      - STOREFRONT_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:4000
    depends_on:
      - core-commerce-api
      - admin-management-api

  core-commerce-api:
    build:
      context: ./core-commerce-api
      args:
        - DATABASE_URL=${CORE_DATABASE_URL}
        - DIRECT_URL=${CORE_DIRECT_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=${CORE_DATABASE_URL}
      - DIRECT_URL=${CORE_DIRECT_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${PUBLIC_SUPABASE_ANON_KEY}

  admin-management-api:
    build:
      context: ./admin-management-api
      args:
        - DATABASE_URL=${ADMIN_DATABASE_URL}
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=${ADMIN_DATABASE_URL}
      - DIRECT_URL=${ADMIN_DIRECT_URL}

  storefront-web:
    build:
      context: ./storefront-web
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/storefront
        - NEXT_PUBLIC_GATEWAY_URL=http://api-gateway:8000
    ports:
      - "${STOREFRONT_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_GATEWAY_URL=http://api-gateway:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/storefront
      - INTERNAL_API_URL=http://api-gateway:8000/api/storefront

  admin-dashboard:
    build:
      context: ./admin-dashboard
    ports:
      - "${ADMIN_DASHBOARD_PORT:-4000}:4000"
    environment:
      - PORT=4000
      - PUBLIC_GATEWAY_URL=http://localhost:8000
      - API_BASE_URL=http://api-gateway:8000/api/admin
