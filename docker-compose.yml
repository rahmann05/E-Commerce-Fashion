services:
  commerce-service:
    container_name: commerce-service
    hostname: commerce-service
    build:
      context: .
      dockerfile: services/commerce-service/Dockerfile
      args:
        - DATABASE_URL=${CORE_DATABASE_URL}
        - DIRECT_URL=${CORE_DIRECT_URL}
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=${CORE_DATABASE_URL}
      - DIRECT_URL=${CORE_DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-novarium-internal-mesh-key-2026}

  admin-service:
    container_name: admin-service
    hostname: admin-service
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
      args:
        - DATABASE_URL=${ADMIN_DATABASE_URL}
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=${ADMIN_DATABASE_URL}
      - DIRECT_URL=${ADMIN_DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-novarium-internal-mesh-key-2026}

  customer-service:
    container_name: customer-service
    hostname: customer-service
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DATABASE_URL=${ADMIN_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-novarium-internal-mesh-key-2026}
      - COMMERCE_SERVICE_URL=http://commerce-service:3001
      - INTERNAL_COMMERCE_API_URL=http://commerce-service:3001/api/commerce
      - ORDER_SERVICE_URL=http://order-service:4003
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}

  order-service:
    container_name: order-service
    hostname: order-service
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - DATABASE_URL=${ADMIN_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-novarium-internal-mesh-key-2026}
      - COMMERCE_SERVICE_URL=http://commerce-service:3001
      - CUSTOMER_SERVICE_URL=http://customer-service:4002
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}

  storefront-web:
    container_name: storefront-web
    hostname: storefront-web
    build:
      context: .
      dockerfile: apps/storefront-web/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_COMMERCE_API_URL=http://localhost:3001/api/commerce
        - NEXT_PUBLIC_CUSTOMER_API_URL=http://localhost:4002/api/customer
        - NEXT_PUBLIC_ORDER_API_URL=http://localhost:4003/api/orders
    ports:
      - "${STOREFRONT_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_COMMERCE_API_URL=http://localhost:3001/api/commerce
      - NEXT_PUBLIC_CUSTOMER_API_URL=http://localhost:4002/api/customer
      - NEXT_PUBLIC_ORDER_API_URL=http://localhost:4003/api/orders
      - INTERNAL_COMMERCE_API_URL=http://commerce-service:3001/api/commerce
      - INTERNAL_CUSTOMER_API_URL=http://customer-service:4002/api/customer
      - INTERNAL_ORDER_API_URL=http://order-service:4003/api/orders
    depends_on:
      - commerce-service
      - customer-service
      - order-service

  admin-web:
    container_name: admin-web
    hostname: admin-web
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
        - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
        - PUBLIC_STOREFRONT_URL=http://localhost:3000
        - PUBLIC_COMMERCE_API_URL=http://localhost:3001/api/commerce/admin
        - PUBLIC_ADMIN_API_URL=http://localhost:4001/api/admin
        - PUBLIC_ORDER_API_URL=http://localhost:4003/api/orders/admin
    ports:
      - "${ADMIN_DASHBOARD_PORT:-4000}:4000"
    environment:
      - PORT=4000
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
      - PUBLIC_COMMERCE_API_URL=http://localhost:3001/api/commerce/admin
      - PUBLIC_ADMIN_API_URL=http://localhost:4001/api/admin
      - PUBLIC_ORDER_API_URL=http://localhost:4003/api/orders/admin
      - INTERNAL_COMMERCE_API_URL=http://commerce-service:3001/api/commerce/admin
      - INTERNAL_ADMIN_API_URL=http://admin-service:4001/api/admin
      - INTERNAL_ORDER_API_URL=http://order-service:4003/api/orders/admin
    depends_on:
      - commerce-service
      - admin-service
