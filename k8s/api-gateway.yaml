apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: novure-ecosystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: your-docker-registry/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: STOREFRONT_BACKEND_URL
          value: "http://core-commerce-api:3001"
        - name: ADMIN_BACKEND_URL
          value: "http://admin-management-api:4001"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: novure-ecosystem
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: api-gateway
