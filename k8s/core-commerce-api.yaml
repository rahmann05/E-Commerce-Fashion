apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-commerce-api
  namespace: novure-ecosystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-commerce-api
  template:
    metadata:
      labels:
        app: core-commerce-api
    spec:
      containers:
      - name: core-commerce-api
        image: your-docker-registry/core-commerce-api:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: novure-secrets
              key: core-database-url
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: core-commerce-api
  namespace: novure-ecosystem
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: core-commerce-api
